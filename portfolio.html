<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shun's Page</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.0/css/all.css" integrity="sha384-Bfad6CLCknfcloXFOyFnlgtENryhrpZCe29RTifKEixXQZ38WheV+i/6YWSzkz3V" crossorigin="anonymous">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="nav"></nav>
    <div class="container-fluid">

        <div class="col-12 text-center">
          <h1>Portfolio</h1>
        </div>
      </div>
      <hr>
      <div class="row">
        <div class="col-6 col-md-5 offset-md-1">
          <div class="card">
            <div class="card-body text-center">
              <h3 class="card-title">あつまれ どうぶつの森用アイテムチェックリスト</h3>
            </div>
            <div class="portfolio-img text-center">
              <img src="./img/animal-crossing-checklist.png" class="card-img-top" alt="あつまれ どうぶつの森用アイテムチェックリスト">
            </div>
            <div class="card-body">
              <p class="card-text">
                Nintendo Switch用ソフト「あつまれ どうぶつの森」で使えるアイテムチェックリストを作ってみました。
              </p>
              <p class="text-center">
                <i class="fab fa-html5 technology-icon"></i>
                <i class="fab fa-css3 technology-icon"></i>
                <i class="fab fa-js technology-icon"></i>
                <i class="fab fa-node technology-icon"></i>
              </p>
              <p class="text-center">
                <a href="./animalcrossing-collector.html" class="btn btn-primary btn-lg" role="button">Detail</a>
              </p>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-5">
          <div class="card">
            <div class="card-body text-center">
              <h3 class="card-title">Vtuberカレンダー</h3>
            </div>
            <div class="portfolio-img text-center">
              <i class="fas fa-calendar-alt portfolio-icon"></i>
            </div>
            <div class="card-body">
              <p class="card-text">
                Vtuber（ホロライブ所属メンバー）の配信予定をGoogleカレンダーで参照できるようにしてみました。
              </p>
              <p class="text-center">
                <i class="fab fa-python technology-icon"></i>
              </p>
              <p class="text-center">
                <a href="./vtuber-calendar.html" class="btn btn-primary btn-lg" role="button">Detail</a>
              </p>
            </div>
          </div>
        </div>
      </div>
